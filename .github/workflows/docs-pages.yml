name: Docs Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build Dokka documentation
        run: ./gradlew --no-daemon :kotlin-no-globals:dokkaGeneratePublicationHtml :kotlin-no-globals-plugin:dokkaGeneratePublicationHtml :kotlin-no-globals-ij-plugin:dokkaGeneratePublicationHtml :kotlin-no-globals-gradle-plugin:dokkaGeneratePublicationHtml

      - name: Assemble Pages site
        run: |
          SITE_DIR="$RUNNER_TEMP/pages-site"
          mkdir -p "$SITE_DIR/kotlin-no-globals" "$SITE_DIR/kotlin-no-globals-plugin" "$SITE_DIR/kotlin-no-globals-ij-plugin" "$SITE_DIR/kotlin-no-globals-gradle-plugin"

          cp -R library/build/dokka/html/. "$SITE_DIR/kotlin-no-globals/"
          cp -R compiler-plugin/build/dokka/html/. "$SITE_DIR/kotlin-no-globals-plugin/"
          cp -R ij-plugin/build/dokka/html/. "$SITE_DIR/kotlin-no-globals-ij-plugin/"
          cp -R gradle-plugin/build/dokka/html/. "$SITE_DIR/kotlin-no-globals-gradle-plugin/"

          cat > "$SITE_DIR/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>kotlin-no-globals docs</title>
            <style>
              body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f4f0e8;
                color: #1c1b18;
              }
              main {
                max-width: 860px;
                margin: 0 auto;
                padding: 48px 24px 72px;
              }
              h1 {
                font-size: 2.5rem;
                margin-bottom: 0.5rem;
              }
              p {
                line-height: 1.6;
              }
              ul {
                padding-left: 1.25rem;
              }
              li {
                margin: 0.6rem 0;
              }
              a {
                color: #7b1f1f;
              }
              code {
                background: rgba(0, 0, 0, 0.05);
                padding: 0.12rem 0.3rem;
                border-radius: 4px;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>kotlin-no-globals</h1>
              <p>
                API docs and module reference for the <code>kotlin-no-globals</code> project family.
              </p>
              <ul>
                <li><a href="./kotlin-no-globals/">kotlin-no-globals</a>: source annotation library</li>
                <li><a href="./kotlin-no-globals-plugin/">kotlin-no-globals-plugin</a>: compiler plugin</li>
                <li><a href="./kotlin-no-globals-ij-plugin/">kotlin-no-globals-ij-plugin</a>: IntelliJ IDEA support plugin</li>
                <li><a href="./kotlin-no-globals-gradle-plugin/">kotlin-no-globals-gradle-plugin</a>: Gradle integration</li>
                <li><a href="https://github.com/wabbit-corp/kotlin-no-globals">Repository</a></li>
              </ul>
            </main>
          </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/pages-site

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
